<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access | Interior Design Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #355f4a;
            --hover-green: #2a4b3a;
            --accent-green: #4caf50;
            --bg-beige: #f4efe7;
            --white: #ffffff;
            --text-main: #333;
            --text-muted: #777;
        }

        /* DARK MODE */
        body.dark {
            background: linear-gradient(rgba(0,0,0,.85), rgba(0,0,0,.85)),
                        url("https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
        }
        body.dark .card-container { background: #1a1a1a; color: white; }
        body.dark .content { background: #121212; }
        body.dark .pricing-card { background: #242424; border-color: #444; }
        body.dark .price-tag, body.dark h2, body.dark h1 { color: #eee; }
        body.dark .bottom-nav { background: #242424; }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            margin: 0; height: 100vh;
            background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
                        url("https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            transition: 0.3s;
        }

        .card-container {
            width: 85%; max-width: 1100px; height: 85%;
            background: #fff; border-radius: 24px;
            display: flex; flex-direction: column; overflow: hidden;
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .header { background: var(--primary-green); color: white; padding: 20px 40px; display: flex; align-items: center; z-index: 10; }
        .header h2 { flex: 1; text-align: center; margin: 0; font-weight: 600; font-size: 18px; }
        .back, .menu { cursor: pointer; font-size: 22px; transition: 0.3s; }

        /* SCROLLABLE CONTENT AREA */
        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px 20px; 
            background: #fafafa; 
            display: block; /* Restored for natural scrolling */
            text-align: center;
            padding-bottom: 120px; /* Space for bottom nav */
        }

        /* PRICING CARD - RESTORED SIZE AND INTERNAL SPACING */
        .pricing-card { 
            background: white; 
            border: 2px solid #eee; 
            border-radius: 25px; 
            padding: 50px 60px; /* Spacious side spacing */
            text-align: center; 
            display: inline-flex; /* Centered in parent via text-align */
            flex-direction: column; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px; 
            margin: 20px auto;
            transition: 0.3s;
        }

        .pricing-card h2 { margin: 0; font-size: 1.8rem; color: var(--primary-green); font-weight: 700; }
        .price-tag { font-size: 2.2rem; font-weight: 800; color: var(--text-main); margin: 5px 0 20px 0; }
        
        /* CENTERED LIST ITEMS - SMALL LETTERS */
        .features-list { 
            list-style: none; 
            padding: 0; 
            margin: 0 auto 30px auto; 
            display: inline-block; 
            text-align: left; 
        }
        
        .features-list li { 
            margin-bottom: 12px; 
            font-size: 15px; 
            color: var(--text-muted); 
            display: flex; 
            align-items: center; 
            text-transform: lowercase; /* Forces small letters */
        }
        
        .features-list li::before { 
            content: '✓'; 
            color: var(--accent-green); 
            font-weight: bold; 
            margin-right: 12px; 
        }

        .buy-btn { background: var(--primary-green); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; font-size: 1.1rem; }
        .buy-btn:hover { background: var(--hover-green); }

        .bottom-nav {
            position: absolute; bottom: 20px; left: 50%; 
            transform: translateX(-50%); width: 400px; 
            background: #fff; border-radius: 30px; 
            display: flex; justify-content: space-around; 
            padding: 14px 0; box-shadow: 0 8px 30px rgba(0,0,0,0.2); z-index: 100;
        }
        .bottom-nav a { text-decoration: none; color: #555; font-size: 14px; }
        .bottom-nav a.active { color: #4d8f6b; font-weight: 700; }

        .side-nav { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; right: 0; background-color: var(--primary-green); overflow-x: hidden; transition: 0.5s; padding-top: 60px; }
        .side-nav a { padding: 18px 32px; text-decoration: none; color: white; display: block; }
        .close-btn { position: absolute; top: 10px; left: 20px; font-size: 30px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="mySideNav" class="side-nav">
    <span class="close-btn" onclick="toggleSideNav()">×</span>
    <a href="index.html">Home</a>
    <a href="explore.html">Explore</a>
    <a href="profile.html">Profile</a>
</div>

<div class="card-container">
    <div class="header">
        <div class="back" onclick="javascript:history.back()">←</div>
        <h2>Premium Package</h2>
        <div class="menu" onclick="toggleSideNav()">☰</div>
    </div>

    <div class="content">
        <div style="margin-bottom: 25px;">
            <h1 style="color: var(--primary-green); margin: 0 0 5px 0; font-size: 2rem;">Elevate Your Experience</h1>
            <p style="color: var(--text-muted); font-size: 1rem;">Choose the perfect plan for your dream home.</p>
        </div>

        <div class="pricing-card">
            <div>
                <h2>Free Trial</h2>
                <div class="price-tag">1 Month</div>
                
                <ul class="features-list">
                    <li>basic personalized design</li>
                    <li>view pre-designed areas</li>
                    <li>saved designs access</li>
                    <li>create user profile</li>
                </ul>
            </div>
            <button class="buy-btn" onclick="location.href='quiz.html'">Start Free Month</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="profile.html" class="active">Profile</a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
    });

    function toggleSideNav() {
        const sideNav = document.getElementById("mySideNav");
        sideNav.style.width = (sideNav.style.width === "250px") ? "0" : "250px";
    }
</script>

</body>
</html>
