<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Designs | Interior Designer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; height: 100vh; background: #f4efe7; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        
        /* DARK MODE OVERRIDES */
        body.dark { background: #121212; }
        body.dark .card { background: #1a1a1a; color: white; border: none; }
        body.dark h2 { color: #4caf50; }
        body.dark .bottom-nav { background: #242424; }
        body.dark .bottom-nav a { color: #aaa; }
        body.dark .img-wrapper { border-color: #333; background: #222; }

        .card { 
            width: 85%; max-width: 1100px; height: 80%; 
            background: #fff; border-radius: 24px; 
            display: flex; flex-direction: column; 
            overflow: hidden; position: relative; padding: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            transition: 0.3s;
        }

        h2 { color: #355f4a; margin-top: 0; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            overflow-y: auto; 
            padding-bottom: 80px; 
        }

        .img-wrapper {
            position: relative;
            width: 100%;
            height: 220px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #eee;
            background: #eee;
            cursor: pointer;
        }

        .grid img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            transition: transform 0.3s ease;
        }

        .delete-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #d9534f; border: none;
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 5; opacity: 0; transition: 0.3s;
        }

        .img-wrapper:hover .delete-btn { opacity: 1; }
        .img-wrapper:hover img { transform: scale(1.05); }

        /* --- MODAL STYLE --- */
        .modal {
            display: none; 
            position: fixed; z-index: 2000; 
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
        }

        .modal-content {
            max-width: 90%; max-height: 80%;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .close-modal {
            position: absolute; top: 20px; right: 30px;
            color: white; font-size: 40px; cursor: pointer;
        }

        .bottom-nav { 
            position: absolute; bottom: 20px; left: 50%; 
            transform: translateX(-50%); width: 450px; 
            background: #fff; border-radius: 30px; 
            display: flex; justify-content: space-around; 
            padding: 14px 0; box-shadow: 0 8px 30px rgba(0,0,0,0.15); 
        }
        
        .bottom-nav a { text-decoration: none; color: #555; font-size: 14px; font-weight: 500; }
        .bottom-nav a.active { color: #355f4a; font-weight: 600; }
    </style>
</head>
<body>

<div id="imageModal" class="modal">
    <span class="close-modal" onclick="closeImage()">&times;</span>
    <img class="modal-content" id="fullImage">
</div>

<div class="card">
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
        <span onclick="history.back()" style="cursor:pointer; font-size: 24px; color: #355f4a;">←</span>
        <h2 style="margin:0;">My Saved Designs 📥</h2>
    </div>
    <div class="grid" id="savedGrid"></div>

    <div class="bottom-nav">
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="profile.html" class="active">Profile</a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
    });

    const grid = document.getElementById('savedGrid');
    const modal = document.getElementById('imageModal');
    const fullImg = document.getElementById('fullImage');

    function renderGallery() {
        const saved = JSON.parse(localStorage.getItem('downloadedDesigns')) || [];
        grid.innerHTML = ""; 

        if (saved.length === 0) {
            grid.innerHTML = `<div id="no-designs" style="text-align:center; width:100%; margin-top:50px; color:#888;"><p>No saved designs yet.</p></div>`;
        } else {
            saved.forEach((item, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'img-wrapper';

                const img = document.createElement('img');
                let imgSrc = (typeof item === 'object') ? item.url : item;
                let imgFilter = (typeof item === 'object') ? item.filter : "none";

                img.src = imgSrc;
                img.style.filter = imgFilter;

                img.onclick = () => openImage(imgSrc, imgFilter);

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = `<span class="material-symbols-outlined">delete</span>`;
                delBtn.onclick = (e) => {
                    e.stopPropagation(); 
                    deleteDesign(index);
                };

                wrapper.appendChild(img);
                wrapper.appendChild(delBtn);
                grid.appendChild(wrapper);
            });
        }
    }

    function openImage(src, filter) {
        modal.style.display = "flex";
        fullImg.src = src;
        fullImg.style.filter = filter;
    }

    function closeImage() {
        modal.style.display = "none";
    }

    function deleteDesign(index) {
        if(!confirm("Are you sure?")) return;
        let saved = JSON.parse(localStorage.getItem('downloadedDesigns')) || [];
        saved.splice(index, 1);
        localStorage.setItem('downloadedDesigns', JSON.stringify(saved));
        renderGallery();
    }

    renderGallery();
</script>
</body>
</html>
